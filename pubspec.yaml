name: islamic_kit
description: >-
  A comprehensive Islamic toolkit for Flutter: prayer times, Qibla compass,
  Hijri calendar, Zakat calculator and Islamic events widgets — all in pure
  Dart with no asset dependencies.
# Package links
homepage: https://github.com/scnz313/islamic_kit
repository: https://github.com/scnz313/islamic_kit
issue_tracker: https://github.com/scnz313/islamic_kit/issues
# Pub.dev search topics
topics:
  - islamic
  - qibla
  - prayer-times
  - hijri
  - zakat
version: 0.2.0

environment:
  sdk: ^3.8.0
  flutter: ">=3.16.0"

dependencies:
  adhan: ^2.0.0+1
  flutter:
    sdk: flutter
  flutter_compass: ^0.7.0
  flutter_local_notifications: ^17.0.0
  geocoding: ^2.1.0
  geolocator: ^10.1.0
  hijri: ^3.0.0
  intl: ^0.19.0
  timezone: ^0.9.2

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

# The following section is specific to Flutter packages.
flutter:
  # This package draws its UI entirely in code (no asset dependencies).
